ja:
  activerecord:
    attributes:
      user:
        email: Eメール
        password: パスワード
        password_confirmation: パスワード（確認用）
      post:
        title: タイトル
        content: 内容
        mood: 気分
    errors:
      models:
        post:
          attributes:
            mood:
              blank: を選択してください
        user:
          attributes:
            password:
              invalid: は半角英数字で入力してください
            password_confirmation:
              confirmation: とパスワードの入力が一致しません

  errors:
    format: "%{attribute}%{message}"
    messages:
      blank: を入力してください
      too_short: "を%{count}文字以上で入力してください"
      too_long: "を%{count}文字以下で入力してください"

  devise:
    failure:
      user:
        not_found_in_database: "メールアドレスまたはパスワードが違います"